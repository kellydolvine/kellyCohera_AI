<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Archives - KellyCohera_AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">KellyCohera_AI 🌸</div>
        <div><a href="/">Accueil</a><a href="/historique">Archives</a></div>
    </nav>

    <div class="container">
        <div class="card" style="padding: 0; overflow: hidden;">
            <h2 style="padding: 30px; margin: 0; background: white;">📊 Vos Analyses Passées</h2>
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Score</th>
                        <th>Verdict</th>
                        <th>Fatigue</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td><strong>{{ log.nom }}</strong></td>
                        <td style="color: var(--flower-pink); font-weight: bold;">{{ log.score_coherence }}%</td>
                        <td>{{ log.verdict }}</td>
                        <td style="font-size: 0.9rem;">{{ log.fatigue_ia }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
