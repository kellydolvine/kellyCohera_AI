<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Archives - KellyCohera_AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);">
    <nav class="navbar">
        <div class="logo">KELLYCOHERA_AI</div>
        <div><a href="/">Accueil</a><a href="/historique">Archives</a></div>
    </nav>

    <div class="container">
        <h1 style="color: var(--midnight); text-align: center; margin-bottom: 40px;">📊 Historique des Expertises</h1>
        
        <div class="card" style="padding: 0; overflow: hidden;">
            <table class="styled-table" style="margin: 0; box-shadow: none;">
                <thead>
                    <tr>
                        <th>Sujet</th>
                        <th>Cohérence</th>
                        <th>Verdict</th>
                        <th>Fatigue IA</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td style="font-weight: bold; color: var(--midnight);">{{ log.nom }}</td>
                        <td style="color: var(--deep-pink); font-weight: bold;">{{ log.score_coherence }}%</td>
                        <td>
                            <span class="badge {{ 'badge-sincere' if log.verdict == 'Sincère ✨' else 'badge-suspect' if log.verdict == 'Suspect 🤨' else 'badge-fiction' }}" 
                                  style="padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold;
                                  {{ 'background: #dcfce7; color: #166534;' if log.verdict == 'Sincère ✨' 
                                     else 'background: #fef9c3; color: #854d0e;' if log.verdict == 'Suspect 🤨' 
                                     else 'background: #fee2e2; color: #991b1b;' }}">
                                {{ log.verdict }}
                            </span>
                        </td>
                        <td style="font-style: italic; color: #64748b;">{{ log.fatigue_ia }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button onclick="window.location.href='/'" style="width: auto; padding: 12px 30px; background: #334155;">
                Retour au Formulaire
            </button>
        </div>
    </div>
</body>
</html>
