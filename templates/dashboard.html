<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archives - KellyCohera_AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">KellyCohera_AI 🌸</div>
        <div class="nav-links">
            <a href="/">Test</a>
            <a href="/dashboard" class="active">Archives</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="glass-card" style="max-width: 900px;">
            <h1>Historique des Analyses</h1>
            <div class="table-container">
                <table class="styled-table">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Score</th>
                            <th>Verdict</th>
                            <th>État IA</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for log in logs %}
                        <tr>
                            <td><strong>{{ log.nom }}</strong></td>
                            <td><span class="badge">{{ log.score_coherence }}%</span></td>
                            <td>{{ log.verdict }}</td>
                            <td style="color: #6366f1; font-size: 0.85rem;">{{ log.fatigue_ia }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            <button onclick="window.location.href='/'" class="btn-secondary">Nouveau Test</button>
        </div>
    </div>
</body>
</html>
