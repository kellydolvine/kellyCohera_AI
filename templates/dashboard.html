<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Archives - KellyCohera_AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🌸 KellyCohera_AI</div>
        <div><a href="/">Accueil</a> <a href="/historique">Archives</a></div>
    </nav>
    <div class="container" style="max-width: 900px;">
        <h1>Historique des Analyses</h1>
        <table class="styled-table">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Score</th>
                    <th>Verdict</th>
                    <th>Fatigue IA</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td><strong>{{ log.nom }}</strong></td>
                    <td><span class="badge-score">{{ log.score_coherence }}%</span></td>
                    <td>{{ log.verdict }}</td>
                    <td style="color: #1e40af;">{{ log.fatigue_ia }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button onclick="window.location.href='/'" style="background: #3b82f6; margin-top: 30px;">Retour Accueil</button>
    </div>
</body>
</html>
