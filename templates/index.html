<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KellyCohera_AI 🌸</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">KellyCohera_AI 🌸</div>
        <div class="nav-links">
            <a href="/" class="active">Test</a>
            <a href="/dashboard">Archives</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="glass-card">
            <h1>Analyse de Cohérence</h1>
            <p class="subtitle">Intelligence Artificielle de Vérification</p>
            
            <form action="/analyse" method="POST" class="styled-form">
                <div class="input-group">
                    <label>Nom complet</label>
                    <input type="text" name="nom" placeholder="Ex: Kelly Dolvine" required>
                </div>

                <div class="grid-inputs">
                    <div class="input-group">
                        <label>Âge</label>
                        <input type="number" name="age" required>
                    </div>
                    <div class="input-group">
                        <label>Revenu ($)</label>
                        <input type="number" name="revenu" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Heures de sommeil</label>
                    <input type="number" name="sommeil" required>
                </div>

                <div class="input-group">
                    <label>Statut</label>
                    <select name="etudiant">
                        <option value="oui">Étudiant(e)</option>
                        <option value="non">Professionnel(le)</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">Lancer l'analyse ✨</button>
            </form>
        </div>
    </div>
</body>
</html>
