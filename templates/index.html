<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KellyCohera_AI 🌸</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">KellyCohera_AI 🌸</div>
        <div class="nav-links">
            <a href="/">Accueil</a>
            <a href="/historique">Archives</a>
        </div>
    </nav>

    <div class="container">
        <h1>Analyse de Cohérence</h1>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Entrez vos informations pour l'analyse IA</p>
        
        <form action="/analyse" method="POST">
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" name="nom" placeholder="Ex: Kelly Dolvine" required>
            </div>

            <div class="form-group">
                <label>Âge</label>
                <input type="number" name="age" placeholder="Votre âge" required>
            </div>

            <div class="form-group">
                <label>Revenu Mensuel ($)</label>
                <input type="number" name="revenu" placeholder="Ex: 1500" required>
            </div>

            <div class="form-group">
                <label>Heures de sommeil / nuit</label>
                <input type="number" name="sommeil" placeholder="Ex: 8" required>
            </div>

            <div class="form-group">
                <label>Êtes-vous étudiant ?</label>
                <select name="etudiant">
                    <option value="oui">Oui, je suis étudiant</option>
                    <option value="non">Non, je travaille</option>
                </select>
            </div>

            <button type="submit">Lancer l'analyse 🚀</button>
        </form>
    </div>
</body>
</html>
