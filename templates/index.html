<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse Douce - KellyCohera_AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">KellyCohera_AI 🌸</div>
        <div><a href="/">Accueil</a><a href="/historique">Archives</a></div>
    </nav>

    <div class="container">
        <form action="/analyse" method="POST">
            <h1>🌸 Expertise de Cohérence 🌿</h1>
            <p style="text-align: center; font-style: italic; color: #64748b;">Laissez l'IA analyser votre fatigue avec douceur.</p>

            <label>Votre joli nom</label>
            <input type="text" name="nom" required placeholder="Ex: Kelly">

            <label>Votre âge</label>
            <input type="number" name="age" required>

            <label>Revenu Mensuel (€)</label>
            <input type="number" name="revenu" required>

            <label>Heures de sommeil (dernière nuit)</label>
            <input type="number" name="sommeil" required>

            <label>Étudiant(e) ?</label>
            <select name="etudiant">
                <option value="oui">Oui, je cultive mon savoir</option>
                <option value="non">Non, je suis sur une autre voie</option>
            </select>

            <button type="submit">🌸 LANCER L'EXPERTISE</button>
        </form>
    </div>
</body>
</html>
