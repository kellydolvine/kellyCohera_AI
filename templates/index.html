{% extends "base.html" %}
{% block content %}
<div class="glass p-10 shadow-2xl">
    <div class="text-center mb-10">
        <h2 class="text-3xl font-black text-slate-800">Analyse de Cohérence</h2>
        <p class="text-pink-500 font-medium italic">"L'IA qui voit à travers vos réponses."</p>
    </div>

    <form action="/analyse" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-8">
        {% for q in questions %}
        <div class="flex flex-col">
            <label class="text-sm font-black text-blue-700 mb-2 ml-2 uppercase tracking-wide">
                {{ q.icon }} {{ q.question }}
            </label>
            
            {% if q.type == "select" %}
            <select name="{{ q.name }}" class="p-4 rounded-2xl bg-white/60 border-2 border-pink-100 focus:border-pink-400 outline-none transition-all cursor-pointer">
                {% for opt in q.options %}<option value="{{ opt }}">{{ opt|capitalize }}</option>{% endfor %}
            </select>
            {% else %}
            <input type="{{ q.type }}" name="{{ q.name }}" placeholder="{{ q.placeholder }}" required
                   class="p-4 rounded-2xl bg-white/60 border-2 border-pink-100 focus:border-pink-400 outline-none transition-all">
            {% endif %}
        </div>
        {% endfor %}
        
        <button type="submit" class="md:col-span-2 mt-6 bg-gradient-to-r from-pink-500 to-blue-500 text-white font-black py-5 rounded-2xl shadow-xl hover:scale-[1.01] active:scale-95 transition-all uppercase tracking-widest text-lg">
            🌸 Lancer l'Expertise KellyCohera
        </button>
    </form>
</div>
{% endblock %}
