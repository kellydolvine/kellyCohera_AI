<!DOCTYPE html>
<html>
<head>
    <title>KellyCohera_AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">KellyCohera_AI</div>
        <div><a href="/">Accueil</a> <a href="/historique">Archives</a></div>
    </nav>
    <div class="container">
        <h1>Analyse de Cohérence</h1>
        <form action="/analyse" method="POST">
            <label>Nom</label>
            <input type="text" name="nom" required>
            
            <label>Âge</label>
            <input type="number" name="age" required>
            
            <label>Revenu Mensuel</label>
            <input type="number" name="revenu" required>
            
            <label>Heures de sommeil</label>
            <input type="number" name="sommeil" required>
            
            <label>Étudiant ?</label>
            <select name="etudiant">
                <option value="oui">Oui</option>
                <option value="non">Non</option>
            </select>
            
            <button type="submit">Analyser</button>
        </form>
    </div>
</body>
</html>
