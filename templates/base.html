<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KellyCohera_AI 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Fleurs décoratives -->
    <div class="flower" style="top: 10%; left: 5%;">🌸</div>
    <div class="flower" style="top: 15%; right: 7%;">🌺</div>
    <div class="flower" style="bottom: 10%; left: 8%;">🌻</div>
    <div class="flower" style="bottom: 15%; right: 5%;">🌷</div>

    <nav class="navbar">
        <div class="logo">KellyCohera_AI 🌸</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="{{ 'active' if request.path == '/' else '' }}">Test</a>
            <a href="{{ url_for('historique') }}" class="{{ 'active' if request.path == '/historique' else '' }}">Archives</a>
        </div>
    </nav>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
