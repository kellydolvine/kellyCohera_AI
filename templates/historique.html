{% extends "base.html" %}
{% block content %}
<div class="glass overflow-hidden shadow-2xl">
    <div class="p-8 bg-white/40 border-b border-white">
        <h2 class="text-2xl font-black text-slate-800">Historique KellyCohera_AI 📊</h2>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead class="bg-blue-500 text-white uppercase text-xs font-black">
                <tr>
                    <th class="p-6">Utilisateur</th>
                    <th class="p-6 text-center">Score de Confiance</th>
                    <th class="p-6">Verdict</th>
                    <th class="p-6">IA Fatigue</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-pink-100">
                {% for l in logs %}
                <tr class="hover:bg-white/40 transition-colors">
                    <td class="p-6">
                        <div class="font-black text-slate-800">{{ l.nom }}</div>
                        <div class="text-xs text-slate-500 font-bold uppercase">{{ l.age }} ans • {{ l.niveau }}</div>
                    </td>
                    <td class="p-6 text-center">
                        <span class="px-4 py-2 rounded-full font-black text-sm bg-white shadow-sm border border-pink-100">
                            {{ l.score_coherence }}%
                        </span>
                    </td>
                    <td class="p-6 font-bold text-slate-700">{{ l.verdict }}</td>
                    <td class="p-6 italic text-pink-600 font-black">{{ l.fatigue_ia }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
