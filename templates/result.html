<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat - KellyCohera_AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">KellyCohera_AI</div>
        <div class="links">
            <a href="{{ url_for('home') }}">Accueil</a>
            <a href="{{ url_for('historique') }}">Archives</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h1>Résultat de l'Expertise</h1>
            <p style="text-align: center;">Sujet : <strong>{{ nom }}</strong></p>

            <div style="text-align: center; margin: 20px 0;">
                <h2 class="{{ 'green' if score > 80 else 'orange' if score > 50 else 'red' }}">
                    Score de cohérence : {{ score }}%
                </h2>
                <p>Verdict : <strong>{{ verdict }}</strong></p>
            </div>

            <div class="remarques">
                <h3>Observations du système :</h3>
                <ul>
                    {% for r in remarques %}
                    <li>{{ r }}</li>
                    {% endfor %}
                </ul>
            </div>

            <div class="card" style="background: #1f2937; border: 1px solid #374151; margin-top: 20px;">
                <h3>Analyse de fatigue :</h3>
                <p>{{ niveau_fatigue }}</p>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 30px;">
                
                <button type="button" 
                        onclick="window.location.href='{{ url_for('home') }}'" 
                        style="flex: 1; background: #4b5563; cursor: pointer;">
                    🔄 RECOMMENCER
                </button>

                <button type="button" 
                        onclick="window.location.href='{{ url_for('historique') }}'" 
                        style="flex: 1; cursor: pointer;">
                    📊 VOIR LES ARCHIVES
                </button>

            </div>
        </div>
    </div>
</body>
</html>
