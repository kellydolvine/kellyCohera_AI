<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse KellyCohera AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4">

    <div class="max-w-xl w-full bg-gray-800 rounded-3xl shadow-2xl border border-gray-700 mt-10 overflow-hidden">
        <div class="bg-gradient-to-r from-purple-700 to-indigo-600 p-6 text-center">
            <h1 class="text-2xl font-black uppercase tracking-tighter">Résultats de l'Expertise</h1>
            <p class="text-indigo-200 text-sm">Dossier : {{ nom }}</p>
        </div>

        <div class="p-8">
            <div class="flex flex-col items-center mb-8">
                <div class="w-24 h-24 rounded-full border-4 {{ 'border-green-500' if score > 80 else 'border-orange-500' }} flex items-center justify-center mb-2">
                    <span class="text-3xl font-bold">{{ score }}%</span>
                </div>
                <p class="text-gray-400 text-xs uppercase tracking-widest">Indice de Sincérité</p>
                <h2 class="text-2xl font-bold mt-1">{{ verdict }}</h2>
            </div>

            <div class="space-y-4 mb-8">
                <h3 class="text-sm font-semibold text-purple-400 uppercase tracking-wider italic">L'IA murmure...</h3>
                {% for r in remarques %}
                <div class="bg-gray-900 border-l-4 border-purple-600 p-4 rounded-r-xl shadow-inner">
                    <p class="text-sm text-gray-300 font-medium">" {{ r }} "</p>
                </div>
                {% endfor %}
            </div>

            <div class="bg-indigo-900/30 p-5 rounded-2xl border border-indigo-500/30 mb-8">
                <h4 class="text-xs text-indigo-400 uppercase mb-1">Diagnostic Fatigue :</h4>
                <p class="text-lg leading-tight">{{ niveau_fatigue }}</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <a href="{{ url_for('home') }}" class="bg-gray-700 hover:bg-gray-600 text-center py-4 rounded-xl font-bold transition duration-300">
                    🔄 Recommencer
                </a>
                <a href="{{ url_for('historique') }}" class="bg-indigo-600 hover:bg-indigo-500 text-center py-4 rounded-xl font-bold transition duration-300 shadow-lg shadow-indigo-500/20">
                    📊 Archives
                </a>
            </div>
        </div>
    </div>

    <p class="mt-10 text-gray-600 text-xs tracking-tighter italic">Propulsé par KellyCohera Engine v2.0 - 2026</p>

</body>
</html>
