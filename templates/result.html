<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Verdict - KellyCohera_AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">KELLYCOHERA_AI</div>
        <div><a href="/">Accueil</a><a href="/historique">Archives</a></div>
    </nav>

    <div class="container">
        <div class="result-box">
            <h1 style="color: var(--hot-pink);">Rapport d'Expertise</h1>
            <p style="opacity: 0.8;">Analyse pour <strong>{{ nom }}</strong></p>

            <div style="margin: 40px 0;">
                <div style="font-size: 4.5rem; font-weight: 900; text-shadow: 0 0 20px rgba(244, 114, 182, 0.3);">{{ score }}%</div>
                <div style="color: var(--hot-pink); letter-spacing: 4px; font-weight: bold; text-transform: uppercase;">{{ verdict }}</div>
            </div>

            <div style="text-align: left; background: rgba(255, 255, 255, 0.03); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
                <h3 style="color: var(--hot-pink); margin-top: 0;">🧐 Observations du Système :</h3>
                {% for r in remarques %}
                <p style="font-style: italic; border-left: 3px solid var(--deep-pink); padding-left: 15px;">" {{ r }} "</p>
                {% endfor %}
            </div>

            <div style="margin-top: 25px; padding: 15px; border-radius: 10px; background: rgba(190, 24, 93, 0.1); color: var(--hot-pink);">
                <strong>Diagnostic Fatigue :</strong> {{ niveau_fatigue }}
            </div>

            <div style="display: flex; gap: 15px; margin-top: 40px;">
                <button onclick="window.location.href='/'" style="background: #334155; flex: 1;">🔄 REFAIRE</button>
                <button onclick="window.location.href='/historique'" style="flex: 1;">📊 ARCHIVES</button>
            </div>
        </div>
    </div>
</body>
</html>
