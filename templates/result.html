{% extends "base.html" %}

{% block content %}
<div class="glass-card" style="text-align: center; max-width: 800px;">
    <h1>Analyse de {{ nom }}</h1>
    <p class="subtitle">{{ verdict }}</p>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: center; margin-top: 20px;">
        <!-- Graphique -->
        <div style="position: relative; max-width: 250px; margin: auto;">
            <canvas id="chart"></canvas>
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
                <span style="font-size: 2rem; font-weight: 800; color: #d63384;">{{ score }}%</span>
            </div>
        </div>

        <!-- Infos -->
        <div style="text-align: left; background: rgba(255,255,255,0.4); padding: 20px; border-radius: 20px;">
            <p><strong>🤖 État de l'IA :</strong> {{ niveau_fatigue }}</p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            <p style="font-style: italic; color: #4b5563;">"{{ blague }}"</p>
        </div>
    </div>

    <div style="margin-top: 30px; display: flex; gap: 15px;">
        <button onclick="window.location.href='/'" class="btn-primary">🔄 Nouveau Test</button>
        <button onclick="window.location.href='/historique'" class="btn-primary" style="background: #6366f1;">📋 Historique</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('chart');
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            datasets: [{
                data: [{{ score }}, {{ 100 - score }}],
                backgroundColor: ['#d63384', '#e2e8f0'],
                borderWidth: 0
            }]
        },
        options: { cutout: '80%', plugins: { legend: { display: false } } }
    });
</script>
{% endblock %}
