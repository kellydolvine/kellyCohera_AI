<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Verdict Floral - KellyCohera_AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">KellyCohera_AI 🌸</div>
        <div><a href="/">Accueil</a><a href="/historique">Archives</a></div>
    </nav>

    <div class="container">
        <div class="card">
            <h1>🌿 Votre Rapport de Cohérence 🌿</h1>
            
            <div style="text-align: center; margin: 40px 0;">
                <div style="font-size: 4rem; color: var(--flower-pink); font-weight: 900;">{{ score }}%</div>
                <div style="font-weight: bold; letter-spacing: 2px; color: var(--sage-green);">{{ verdict }}</div>
            </div>

            <div style="background: #fdf2f8; padding: 25px; border-radius: 20px; border-left: 5px solid var(--flower-pink);">
                <h3 style="color: var(--midnight); margin-top: 0;">Observations de l'IA :</h3>
                {% for r in remarques %}
                <p style="font-style: italic; color: #334155;">" {{ r }} "</p>
                {% endfor %}
            </div>

            <div style="margin-top: 30px; text-align: center; color: var(--sage-green);">
                <strong>Analyse fatigue :</strong> {{ niveau_fatigue }}
            </div>

            <div style="display: flex; gap: 20px; margin-top: 40px;">
                <a href="/" style="flex: 1; text-decoration: none;">
                    <button type="button" style="background: #e2e8f0; color: #475569; box-shadow: none;">🔄 REFAIRE</button>
                </a>
                <a href="/historique" style="flex: 1; text-decoration: none;">
                    <button type="button">📊 ARCHIVES</button>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
